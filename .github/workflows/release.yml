name: Release Managed Solution

on:
  workflow_dispatch:
    inputs:
      solution_name:
        description: 'Solution name in Dataverse'
        required: true
        default: 'ConvTranscriptViewerCodeApps'
        type: string

# Only allow one release at a time
concurrency:
  group: release
  cancel-in-progress: false

jobs:
  build-and-release:
    runs-on: windows-latest
    permissions:
      contents: write  # Needed to create releases

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Detect app version from source
        id: appversion
        shell: bash
        run: |
          VERSION=$(sed -n 's/.*app-version">v\([^<]*\).*/\1/p' src/App.tsx)
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "Detected app version: $VERSION"

      - name: Check if release already exists
        shell: bash
        run: |
          if git tag -l "v${{ steps.appversion.outputs.version }}" | grep -q .; then
            echo "::error::Tag v${{ steps.appversion.outputs.version }} already exists. Bump the version in App.tsx first."
            exit 1
          fi

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build app
        run: npm run build

      - name: Install Power Platform CLI
        uses: microsoft/powerplatform-actions/actions-install@v1

      - name: Resolve environment URL from ID
        id: env
        shell: pwsh
        run: |
          $pacPath = $env:POWERPLATFORMTOOLS_PACPATH
          Write-Host "Found pac at: $pacPath"

          & $pacPath auth create --applicationId ${{ secrets.PAC_APP_ID }} --clientSecret ${{ secrets.PAC_CLIENT_SECRET }} --tenant ${{ secrets.PAC_TENANT_ID }}
          $envJson = & $pacPath admin list --output json
          $envList = $envJson | ConvertFrom-Json
          $matched = $envList | Where-Object { $_.EnvironmentId -eq "${{ secrets.PAC_ENVIRONMENT_ID }}" }
          if (-not $matched) {
            Write-Error "Environment ${{ secrets.PAC_ENVIRONMENT_ID }} not found"
            exit 1
          }
          $url = $matched.Url.TrimEnd('/')
          echo "url=$url" >> $env:GITHUB_OUTPUT
          Write-Host "Resolved environment URL: $url"

      - name: Authenticate with Power Platform
        uses: microsoft/powerplatform-actions/who-am-i@v1
        with:
          environment-url: ${{ steps.env.outputs.url }}
          app-id: ${{ secrets.PAC_APP_ID }}
          client-secret: ${{ secrets.PAC_CLIENT_SECRET }}
          tenant-id: ${{ secrets.PAC_TENANT_ID }}

      - name: Get current solution version and bump it
        id: solversion
        shell: pwsh
        run: |
          $pacPath = $env:POWERPLATFORMTOOLS_PACPATH
          # Get current solution version from Dataverse
          $solJson = & $pacPath solution list --environment ${{ steps.env.outputs.url }} --output json
          $output = $solJson | ConvertFrom-Json
          $sol = $output | Where-Object { $_.SolutionUniqueName -eq "${{ inputs.solution_name }}" }
          if (-not $sol) {
            Write-Error "Solution '${{ inputs.solution_name }}' not found in environment"
            exit 1
          }
          $current = $sol.VersionNumber
          Write-Host "Current solution version: $current"

          # Bump the last segment (1.0.0.5 -> 1.0.0.6)
          $parts = $current.Split('.')
          $parts[$parts.Count - 1] = [string]([int]$parts[$parts.Count - 1] + 1)
          $next = $parts -join '.'
          Write-Host "Next solution version: $next"

          # Set it in Dataverse
          & $pacPath solution online-version --solution-name ${{ inputs.solution_name }} --solution-version $next --environment ${{ steps.env.outputs.url }}

          echo "current=$current" >> $env:GITHUB_OUTPUT
          echo "next=$next" >> $env:GITHUB_OUTPUT

      - name: Export managed solution
        uses: microsoft/powerplatform-actions/export-solution@v1
        with:
          environment-url: ${{ steps.env.outputs.url }}
          app-id: ${{ secrets.PAC_APP_ID }}
          client-secret: ${{ secrets.PAC_CLIENT_SECRET }}
          tenant-id: ${{ secrets.PAC_TENANT_ID }}
          solution-name: ${{ inputs.solution_name }}
          solution-output-file: ${{ github.workspace }}/${{ inputs.solution_name }}_${{ steps.solversion.outputs.next }}_managed.zip
          managed: true

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ steps.appversion.outputs.version }}
          name: MCS Conversation Viewer v${{ steps.appversion.outputs.version }} (Solution ${{ steps.solversion.outputs.next }})
          body: |
            ## MCS Conversation Viewer v${{ steps.appversion.outputs.version }}
            **Solution version**: ${{ steps.solversion.outputs.next }} (bumped from ${{ steps.solversion.outputs.current }})

            ### Installation
            1. Download the managed solution `.zip` below
            2. Import it into your Power Platform environment via [make.powerapps.com](https://make.powerapps.com) → Solutions → Import
            3. Configure the data sources (conversationtranscripts, bot, aaduser tables)

            ### Prerequisites
            - Power Platform environment with Copilot Studio agents
            - Conversation transcripts enabled on your agents
          files: |
            ${{ github.workspace }}/${{ inputs.solution_name }}_${{ steps.solversion.outputs.next }}_managed.zip
          draft: false
          prerelease: false
