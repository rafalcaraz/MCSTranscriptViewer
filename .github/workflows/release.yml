name: Release Managed Solution

on:
  workflow_dispatch:
    inputs:
      solution_name:
        description: 'Solution name in Dataverse'
        required: true
        default: 'ConvTranscriptViewerCodeApps'
        type: string

concurrency:
  group: release
  cancel-in-progress: false

jobs:
  build-and-release:
    runs-on: windows-latest
    permissions:
      contents: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Detect app version from source
        id: appversion
        shell: bash
        run: |
          VERSION=$(sed -n 's/.*app-version">v\([^<]*\).*/\1/p' src/App.tsx)
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "Detected app version: $VERSION"

      - name: Check if release already exists
        shell: bash
        run: |
          if git tag -l "v${{ steps.appversion.outputs.version }}" | grep -q .; then
            echo "::error::Tag v${{ steps.appversion.outputs.version }} already exists. Bump the version in App.tsx first."
            exit 1
          fi

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build app
        run: npm run build

      - name: Install Power Platform CLI
        uses: microsoft/powerplatform-actions/actions-install@v1

      - name: Authenticate pac CLI
        shell: pwsh
        run: |
          $pac = $env:POWERPLATFORMTOOLS_PACPATH
          & $pac auth create --applicationId ${{ secrets.PAC_APP_ID }} --clientSecret ${{ secrets.PAC_CLIENT_SECRET }} --tenant ${{ secrets.PAC_TENANT_ID }} --environment ${{ secrets.PAC_ENVIRONMENT_ID }}

      - name: Get current solution version and bump it
        id: solversion
        shell: pwsh
        run: |
          $pac = $env:POWERPLATFORMTOOLS_PACPATH
          $raw = & $pac solution list --environment ${{ secrets.PAC_ENVIRONMENT_ID }} --output json 2>&1 | Out-String
          $jsonStart = $raw.IndexOf('[')
          if ($jsonStart -lt 0) { $jsonStart = $raw.IndexOf('{') }
          if ($jsonStart -lt 0) {
            Write-Host "Raw: $raw"
            Write-Error "No JSON in pac solution list output"
            exit 1
          }
          $solutions = $raw.Substring($jsonStart) | ConvertFrom-Json
          $sol = $solutions | Where-Object { $_.SolutionUniqueName -eq "${{ inputs.solution_name }}" }
          if (-not $sol) {
            Write-Error "Solution '${{ inputs.solution_name }}' not found"
            exit 1
          }
          $current = $sol.VersionNumber
          Write-Host "Current: $current"

          $parts = $current.Split('.')
          $parts[$parts.Count - 1] = [string]([int]$parts[$parts.Count - 1] + 1)
          $next = $parts -join '.'
          Write-Host "Next: $next"

          & $pac solution online-version --solution-name ${{ inputs.solution_name }} --solution-version $next --environment ${{ secrets.PAC_ENVIRONMENT_ID }}

          echo "current=$current" >> $env:GITHUB_OUTPUT
          echo "next=$next" >> $env:GITHUB_OUTPUT

      - name: Export managed solution
        shell: pwsh
        run: |
          $pac = $env:POWERPLATFORMTOOLS_PACPATH
          & $pac solution export --name ${{ inputs.solution_name }} --path "${{ github.workspace }}\${{ inputs.solution_name }}_${{ steps.solversion.outputs.next }}_managed.zip" --managed --environment ${{ secrets.PAC_ENVIRONMENT_ID }}

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ steps.appversion.outputs.version }}
          name: MCS Conversation Viewer v${{ steps.appversion.outputs.version }} (Solution ${{ steps.solversion.outputs.next }})
          body: |
            ## MCS Conversation Viewer v${{ steps.appversion.outputs.version }}
            **Solution version**: ${{ steps.solversion.outputs.next }} (bumped from ${{ steps.solversion.outputs.current }})

            ### Installation
            1. Download the managed solution `.zip` below
            2. Import it into your Power Platform environment via [make.powerapps.com](https://make.powerapps.com) → Solutions → Import
            3. Configure the data sources (conversationtranscripts, bot, aaduser tables)

            ### Prerequisites
            - Power Platform environment with Copilot Studio agents
            - Conversation transcripts enabled on your agents
          files: |
            ${{ github.workspace }}/${{ inputs.solution_name }}_${{ steps.solversion.outputs.next }}_managed.zip
          draft: false
          prerelease: false
