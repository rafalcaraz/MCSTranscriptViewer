name: CI

on:
  push:
    branches: [main, Dev]
    paths-ignore:
      - '**.md'
      - 'docs/**'
  pull_request:
    branches: [main, Dev]
    paths-ignore:
      - '**.md'
      - 'docs/**'

# Cancel in-progress runs when a new commit is pushed to the same branch
concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Lint, type-check, test, build
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Type-check
        run: npx tsc --noEmit

      - name: Test
        run: npm test

      - name: Build
        run: npm run build
